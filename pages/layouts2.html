<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;400;700;900&display=swap" rel="stylesheet">

    <title>EnergyGreen</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="../css/layouts2.css">
</head>
<body>
    <section class="hero">
        <header class="header">
            <h2>ENERGY<span>GREEN</span></h2>
            <nav>
                <ul class="header-menu">
                    <li><a href="#" class="item-menu" aria-label="Painel Solar"><i class="fa-solid fa-solar-panel"></i></a></li>
                    <li><a href="#" class="item-menu" aria-label="Radiação"><i class="fa-solid fa-circle-radiation"></i></a></li>
                    <li><a href="#" class="item-menu" aria-label="Estação de Recarga"><i class="fa-solid fa-charging-station"></i></a></li>
                    <li><a href="#" class="item-menu" aria-label="Energia Solar"><i class="fa-solid fa-sun"></i></a></li>
                </ul>
            </nav>
        </header>

        <footer class="header-footer">
            <h2>Fontes de <span>energia</span> renováveis</h2>
            <figure class="header-grid">
                <img src="../images/energia4.jpg" alt="Parque Eólico e Solar" loading="lazy">
                <img src="../images/energia5.jpg" alt="Energia das Ondas" loading="lazy">
                <img src="../images/energia6.jpg" alt="Moinho de Vento" loading="lazy">
                <img src="../images/energia7.jpg" alt="Painéis Solares na Neve" loading="lazy">
            </figure>
        </footer>
    </section>

    <main class="container energy" id="energy">
        <h2 class="titles">
            Promovendo novas <span>energias,</span> tecnologias e <span>soluções</span>
        </h2>
        
        <section class="energy-grid">
            <a href="#" class="energy-grid-item">
                <img src="../images/energia1.jpg" alt="Energia Eólica" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
            <a href="#" class="energy-grid-item">
                <img src="../images/energia2.jpg" alt="Fazenda de Energia Solar" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
            <a href="#" class="energy-grid-item">
                <img src="../images/energia6.jpg" alt="Moinho Histórico" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
            <a href="#" class="energy-grid-item">
                <img src="../images/energia3.jpg" alt="Torres Eólicas na Névoa" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
            <a href="#" class="energy-grid-item">
                <img src="../images/energia5.jpg" alt="Ondas do Mar" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
            <a href="#" class="energy-grid-item">
                <img src="../images/energia4.jpg" alt="Painéis Solares no Deserto" loading="lazy">
                <div class="card-overlay"></div>
                <p>Mais informações</p>
            </a>
        </section>
    </main>

    <footer class="footer-page">
        <section class="footer-brand">
            <h2>Energy<span>Green</span></h2>
            <h4>Energia inteligente para um mundo melhor</h4>
        </section>
        <section class="footer-socials">
            <a href="#" class="item-menu" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" class="item-menu" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="item-menu" aria-label="Twitch"><i class="fa-brands fa-twitch"></i></a>
            <a href="#" class="item-menu" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
        </section>
    </footer>
</body>
</html>
